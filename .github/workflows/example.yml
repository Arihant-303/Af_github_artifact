name: My workflow
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install cowsay program
        run: sudo apt-get install cowsay

      - name: Run cowsay
        run: cowsay -f dragon "Hello from the dragon..!!" >> dragon.txt

      - name: Sleep for 10 seconds
        run: sleep 10

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Test if file exists
        run: grep -i "dragon" dragon.txt

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        run: echo "Deploying to production..."
        
      - name: Read the file
        run: cat dragon.txt
